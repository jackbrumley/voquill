<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshots | FOSS Voquill</title>
    <meta name="description" content="FOSS, truly free & open-source offline dictation that types into any app. Local voice-to-text keeps your data on your device. No subscriptions.">
    <link rel="canonical" href="https://voquill.org/screenshots.html">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --colors-bg-primary: #2b2e34;
            --colors-bg-gradient-warm: #3a2c3d;
            --colors-bg-gradient-cool: #243942;
            --colors-text-primary: #ffffff;
            --colors-text-secondary: #c5cbd3;
            --colors-accent-primary: #5865f2;
            --colors-accent-hover: #4752c4;
            --colors-glass-bg: rgba(35, 37, 42, 0.72);
            --colors-glass-blur: 16px;
            --typography-font-main: "Inter", 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--typography-font-main);
            background: linear-gradient(135deg, var(--colors-bg-gradient-warm) 0%, var(--colors-bg-primary) 50%, var(--colors-bg-gradient-cool) 100%);
            background-attachment: fixed;
            color: var(--colors-text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 95%;
            padding: 4rem 1rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--colors-accent-primary);
            color: var(--colors-text-primary);
            padding: 0.85rem 2.25rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.18);
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: var(--colors-accent-hover);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.24);
        }

        .back-link {
            margin-bottom: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            max-width: 1100px;
            margin: 0 auto;
            align-items: stretch;
        }

        .screenshot-card {
            background: var(--colors-glass-bg);
            backdrop-filter: blur(var(--colors-glass-blur));
            border-radius: 20px;
            padding: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .screenshot-card:hover {
            transform: translateY(-5px);
        }

        .screenshot-card img, .screenshot-card video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            flex-grow: 1;
            object-fit: contain;
            background: rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .screenshot-card p {
            margin-top: 1.25rem;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.4;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Lightbox Styles */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            background: #000;
        }

        .lightbox-overlay.active .lightbox-content {
            transform: scale(1);
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #d9dfe7;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn back-link">Back to Home</a>
        <h1>Screenshots</h1>
        
        <div class="gallery">
            <div class="screenshot-card">
                <img src="screenshots/screenshot-status.png" alt="Voquill Status View">
                <p>Minimalist status overlay during transcription.</p>
            </div>
            <div class="screenshot-card">
                <img src="screenshots/screenshot-config1.png" alt="Voquill Engine Config">
                <p>Configure the transcription engine and local AI models.</p>
            </div>
            <div class="screenshot-card">
                <img src="screenshots/screenshot-config2.png" alt="Voquill Settings">
                <p>Customize global shortcuts and application behavior.</p>
            </div>
            <div class="screenshot-card">
                <img src="screenshots/screenshot-history.png" alt="Voquill History">
                <p>Local-only history to review your recent dictations.</p>
            </div>
        </div>
    </div>
    <footer>
        &copy; 2026 FOSS Voquill Project. Free and Open Source (MIT).
    </footer>

    <div class="lightbox-overlay" id="lightbox">
        <div id="lightbox-container"></div>
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxContainer = document.getElementById('lightbox-container');
        const cards = document.querySelectorAll('.screenshot-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const media = card.querySelector('img, video');
                lightboxContainer.innerHTML = '';
                
                if (media.tagName === 'VIDEO') {
                    const video = document.createElement('video');
                    video.src = media.querySelector('source').src;
                    video.autoplay = true;
                    video.controls = true;
                    video.loop = true;
                    video.className = 'lightbox-content';
                    lightboxContainer.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = media.src;
                    img.className = 'lightbox-content';
                    lightboxContainer.appendChild(img);
                }
                
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.classList.contains('lightbox-content') === false) {
                lightbox.classList.remove('active');
                lightboxContainer.innerHTML = '';
                document.body.style.overflow = 'auto';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                lightboxContainer.innerHTML = '';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
