<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voquill Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #background {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #3a2c3d 0%, #2b2e34 50%, #243942 100%);
        }
    </style>
</head>
<body>
    <div id="background"></div>
</body>
</html>
