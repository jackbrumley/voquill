[[permission]]
identifier = "allow-app-commands"
description = "Allow all custom app commands"
commands.allow = [
    "start_recording",
    "stop_recording",
    "get_config",
    "save_config",
    "test_api_key",
    "get_current_status",
    "get_history",
    "clear_history",
    "check_hotkey_status",
    "manual_register_hotkey",
    "configure_hotkey",
    "apply_captured_hotkey",
    "get_hotkey_binding_state",
    "minimize_to_tray_or_taskbar",
    "quit_application",
    "get_audio_devices",
    "start_mic_test",
    "stop_mic_test",
    "stop_mic_playback",
    "open_debug_folder",
    "get_session_log_text",
    "copy_session_log_to_clipboard",
    "open_session_log",
    "log_ui_event",
    "get_available_engines",
    "get_available_models",
    "check_model_status",
    "download_model",
    "get_linux_setup_status",
    "request_audio_permission",
    "request_input_permission",
    "set_configuring_hotkey",
    "get_wayland_portal_version",
    "get_portal_diagnostics",
    "get_system_shortcut_context"
]
